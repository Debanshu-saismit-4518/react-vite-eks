apiVersion: apps/v1
kind: Deployment
metadata:
  name: react-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: react-app

  template:
    metadata:
      labels:
        app: react-app

    spec:
      containers:
      - name: react-app

        image: 605599552246.dkr.ecr.ap-south-1.amazonaws.com/react-vite-eks:latest

        imagePullPolicy: Always

        ports:
        - containerPort: 3000
